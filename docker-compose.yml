services:
  dashboard:
    build: .
    environment:
      AGENTMESH_DB: /data/agentmesh.db
      AGENTMESH_DEMO_SEED: ${AGENTMESH_DEMO_SEED:-true}
      AGENTMESH_AUTH_MODE: none
    command: >
      sh -c "if [ \"$$AGENTMESH_DEMO_SEED\" != \"false\" ]; then
        agentmesh --db /data/agentmesh.db demo seed --reset;
      fi;
      agentmesh --db /data/agentmesh.db dashboard --host 0.0.0.0 --port 8787"
    ports:
      - "8787:8787"
    volumes:
      - agentmesh-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/healthz', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  agentmesh-data:
